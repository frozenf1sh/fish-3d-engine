name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            triplet: x64-linux
            artifact_name: linux
            archive_cmd: tar -czf ../fish-engine-${{ github.ref_name }}-linux.tar.gz .
            artifact_file: fish-engine-${{ github.ref_name }}-linux.tar.gz
          - os: windows-latest
            triplet: x64-windows-static # 静态链接！解决找不到 dll 的核心！
            artifact_name: windows
            archive_cmd: 7z a ../fish-engine-${{ github.ref_name }}-windows.zip *
            artifact_file: fish-engine-${{ github.ref_name }}-windows.zip

    env:
      BUILD_TYPE: Release
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build xorg-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev mesa-common-dev libgl1-mesa-dev

    - name: Setup MSVC Environment (Windows only)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os }}-ccache-release-${{ github.ref }}
        variant: sccache

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      id: runvcpkg
      with:
        vcpkgGitCommitId: 'd5462800eb2cda3d06f9edf50893f570355570d9'
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Configure CMake
      shell: bash
      # 这句很重要：如果是 MSVC 并且是静态 triplet，要求使用静态运行时库 (/MT)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    # 关键步骤：使用 CMake Install 提取所需文件 (提取到 staged_install 目录)
    - name: Install Package
      run: cmake --install build --prefix staged_install --config ${{ env.BUILD_TYPE }}

    # 跨平台打包 (Windows 打 zip，Linux 打 tar.gz)
    - name: Archive Release
      shell: bash
      working-directory: staged_install
      run: ${{ matrix.archive_cmd }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifact-${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_file }}
        retention-days: 5

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        pattern: release-artifact-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-artifacts/*.tar.gz
          release-artifacts/*.zip
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
